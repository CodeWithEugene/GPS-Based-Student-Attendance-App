<!--
  Paste into Supabase: Authentication → Email Templates → Magic Link
  (Passwordless email: {{ .Token }} is the numeric OTP — use 6 digits in Auth → Providers → Email to match the app.)
  OTP only — no magic link / {{ .ConfirmationURL }}.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your login code</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f4;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f4;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;">
          <tr>
            <td style="padding:28px 24px 12px;text-align:center;background-color:#1B5E20;">
              <img
                src="https://www.jkuat.ac.ke/wp-content/uploads/2024/04/jkuatlogo1.png"
                alt="JKUAT"
                width="120"
                height="auto"
                style="display:block;margin:0 auto;max-width:160px;height:auto;"
              />
            </td>
          </tr>
          <tr>
            <td style="padding:24px 24px 20px;">
              <h2 style="margin:0 0 12px;font-size:22px;color:#1A1A1A;">Your login code</h2>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.5;color:#444444;">
                Use this one-time code to sign in to the GPS attendance app:
              </p>
              <p style="margin:0 0 24px;text-align:center;">
                <span style="display:inline-block;padding:14px 28px;font-size:28px;font-weight:700;letter-spacing:6px;color:#1B5E20;background-color:#E8F5E9;border-radius:10px;border:2px solid #1B5E20;">
                  {{ .Token }}
                </span>
              </p>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#666666;">
                This code expires soon. If you did not request it, you can ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background-color:#fafafa;border-top:1px solid #eeeeee;text-align:center;">
              <p style="margin:0;font-size:12px;color:#888888;">
                Jomo Kenyatta University of Agriculture and Technology
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
